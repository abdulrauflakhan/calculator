<!DOCTYPE html>
<html>
    <head>
        <title>calculator</title>
        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <div class="calculator">
            <form>
                <div>
                    <input type="text" id="display" name="display" disabled>
                </div>
                <div>
                    <input type="text" id="result" name="result" disabled>
                </div>
                <div class="clear-btn">
                    <button id="clear" type="button">C</button><br>
                </div>
                <div class="buttons">
                        <button class="num" value="7" type="button">7</button>
                        <button class="num" value="8" type="button">8</button>
                        <button class="num" value="9" type="button">9</button>
                        <button class="op" value="divide" type="button">/</button>
                        <button class="num" value="4" type="button">4</button>
                        <button class="num" value="5" type="button">5</button>
                        <button class="num" value="6" type="button">6</button>
                        <button class="op" value="multiply" type="button">*</button>
                        <button class="num" value="1" type="button">1</button>
                        <button class="num" value="2" type="button">2</button>
                        <button class="num" value="3" type="button">3</button>
                        <button class="op" value="minus" type="button">-</button>
                        <button id="dot" type="button">.</button>
                        <button class="num" value="0" type="button">0</button>
                        <button class="op" value="plus" type="button">+</button>
                        <button id="btn" type="button">=</button>
                </div>
            </form>
            
        </div>
    </body>
    <script type="text/javascript" charset="utf-8" src="index.js"></script>
</html>
